<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCode Remote</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #161b22;
            padding: 12px 16px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f85149;
        }

        .status-dot.connected {
            background: #3fb950;
        }

        .controls {
            background: #161b22;
            padding: 8px 16px;
            border-bottom: 1px solid #30363d;
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary {
            background: #238636;
            color: white;
        }

        .btn-primary:hover {
            background: #2ea043;
        }

        .btn-danger {
            background: #f85149;
            color: white;
        }

        .btn-danger:hover {
            background: #da3633;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .message {
            margin-bottom: 12px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            margin-left: auto;
        }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user .message-bubble {
            background: #238636;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.agent .message-bubble {
            background: #21262d;
            color: #c9d1d9;
            border-bottom-left-radius: 4px;
        }

        .message.error .message-bubble {
            background: rgba(248, 81, 73, 0.1);
            color: #f85149;
            border: 1px solid #f85149;
        }

        .message.system .message-bubble {
            background: rgba(88, 166, 255, 0.1);
            color: #58a6ff;
            border: 1px solid #58a6ff;
            text-align: center;
            font-size: 13px;
        }

        .input-container {
            background: #161b22;
            padding: 12px 16px;
            border-top: 1px solid #30363d;
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
        }

        .input-wrapper textarea {
            flex: 1;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 10px 14px;
            color: #c9d1d9;
            font-size: 15px;
            resize: none;
            max-height: 120px;
            font-family: inherit;
        }

        .input-wrapper textarea:focus {
            outline: none;
            border-color: #58a6ff;
        }

        .send-btn {
            background: #238636;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #2ea043;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>OpenCode Remote</h1>
        <div class="status">
            <span class="status-dot" id="serverStatus"></span>
            <span id="serverStatusText">就绪</span>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-primary" id="startBtn" onclick="startAgent()">启动</button>
        <button class="btn btn-danger" id="stopBtn" onclick="stopAgent()" disabled>停止</button>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="message system">
            <div class="message-bubble">
                欢迎使用 OpenCode Remote！<br>
                点击"启动"开始使用。
            </div>
        </div>
    </div>

    <div class="input-container">
        <div class="input-wrapper">
            <textarea id="messageInput" placeholder="输入消息..." rows="1" onkeydown="handleKeyDown(event)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        let isAgentConnected = false;
        let lastMsgId = 0;
        let pollInterval = null;

        function updateStatus(connected) {
            isAgentConnected = connected;
            const dot = document.getElementById('serverStatus');
            const text = document.getElementById('serverStatusText');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            
            if (connected) {
                dot.className = 'status-dot connected';
                text.textContent = '已连接';
            } else {
                dot.className = 'status-dot';
                text.textContent = '就绪';
            }
            
            startBtn.disabled = connected;
            stopBtn.disabled = !connected;
        }

        function handleMessage(msg) {
            switch (msg.type) {
                case 'status':
                    if (msg.status === 'connected') {
                        updateStatus(true);
                        addSystemMessage('OpenCode 已启动');
                    } else if (msg.status === 'disconnected') {
                        updateStatus(false);
                        addSystemMessage('OpenCode 已停止');
                    }
                    break;
                case 'input':
                    addUserMessage(msg.content);
                    break;
                case 'output':
                    addAgentMessage(msg.content);
                    break;
                case 'error':
                    addErrorMessage(msg.content);
                    break;
                case 'system':
                    addSystemMessage(msg.content);
                    break;
            }
        }

        function addUserMessage(content) {
            addMessage(content, 'user');
        }

        function addAgentMessage(content) {
            addMessage(content, 'agent');
        }

        function addErrorMessage(content) {
            addMessage(content, 'error');
        }

        function addSystemMessage(content) {
            addMessage(content, 'system');
        }

        function addMessage(content, type) {
            const container = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = content;
            
            messageDiv.appendChild(bubble);
            container.appendChild(messageDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;
        }

        async function sendToServer(msg) {
            try {
                await fetch('/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(msg)
                });
            } catch (e) {
                addSystemMessage('发送失败: ' + e.message);
            }
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            sendToServer({ type: 'input', content: message });
            addUserMessage(message);
            
            input.value = '';
            input.style.height = 'auto';
        }

        function startAgent() {
            sendToServer({ type: 'start' });
        }

        function stopAgent() {
            sendToServer({ type: 'stop' });
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        async function poll() {
            try {
                const response = await fetch(`/poll?since=${lastMsgId}`);
                const data = await response.json();
                
                for (const msg of data.messages) {
                    lastMsgId = Math.max(lastMsgId, msg.id);
                    handleMessage(msg);
                }
            } catch (e) {
                // Ignore poll errors
            }
        }

        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // Start polling
        pollInterval = setInterval(poll, 500);
        poll();
    </script>
</body>
</html>
